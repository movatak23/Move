<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Central de Ajuda — Move</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #000000;
  --bg2: #0a0a0a;
  --bg3: #111111;
  --bg4: #181818;
  --border: #1e1e1e;
  --border2: #2a2a2a;
  --text: #f0f0f0;
  --text2: #888888;
  --text3: #444444;
  --accent: #00bfff;
  --accent2: #0099cc;
  --accent-dim: rgba(0,191,255,0.08);
  --accent-dim2: rgba(0,191,255,0.15);
  --red: #e05a5a;
  --red-dim: rgba(224,90,90,0.1);
  --yellow: #f5b041;
  --yellow-dim: rgba(245,176,65,0.1);
  --r: 10px;
  --mono: 'Space Mono', monospace;
  --sans: 'DM Sans', sans-serif;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  min-height: 100vh;
  font-size: 14px;
  line-height: 1.55;
}
a { color: var(--accent); text-decoration: none; }

/* ── TOPBAR ───────────────────────────────────── */
.topbar {
  position: sticky; top: 0; z-index: 50;
  display: flex; align-items: center; justify-content: space-between;
  gap: 16px;
  padding: 16px 28px;
  background: rgba(0,0,0,0.88);
  backdrop-filter: blur(8px);
  border-bottom: 1px solid var(--border);
}
.topbar .brand { display: flex; align-items: center; gap: 10px; }
.topbar .brand-mark {
  font-family: var(--mono); font-weight: 700; font-size: 16px;
  color: var(--bg); background: var(--accent);
  width: 30px; height: 30px; border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
}
.topbar .brand-text { font-family: var(--mono); font-size: 15px; letter-spacing: 0.5px; }
.topbar .brand-text span { color: var(--text2); font-weight: 400; }
.topbar .back {
  font-family: var(--mono); font-size: 12px; color: var(--text2);
  border: 1px solid var(--border2); border-radius: 8px;
  padding: 8px 14px; transition: 0.15s;
  white-space: nowrap;
}
.topbar .back:hover { color: var(--accent); border-color: var(--accent); }

/* ── HERO / BUSCA ─────────────────────────────── */
.hero {
  padding: 56px 24px 28px;
  text-align: center;
  background:
    radial-gradient(ellipse 700px 280px at 50% 0%, rgba(0,191,255,0.07) 0%, transparent 70%),
    var(--bg);
}
.hero .eyebrow {
  font-family: var(--mono); font-size: 11px; letter-spacing: 2px;
  color: var(--accent); text-transform: uppercase; margin-bottom: 14px;
}
.hero h1 {
  font-size: clamp(26px, 4vw, 38px); font-weight: 700; letter-spacing: -0.5px;
  margin-bottom: 10px;
}
.hero p.sub { color: var(--text2); font-size: 14.5px; max-width: 460px; margin: 0 auto 30px; }

.search-wrap { max-width: 560px; margin: 0 auto; position: relative; }
.search-wrap input {
  width: 100%; padding: 16px 50px 16px 20px;
  background: var(--bg2); border: 1px solid var(--border2);
  border-radius: 14px; color: var(--text); font-size: 15px; font-family: var(--sans);
  outline: none; transition: 0.15s;
}
.search-wrap input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-dim); }
.search-wrap input::placeholder { color: var(--text3); }
.search-wrap .ico {
  position: absolute; right: 18px; top: 50%; transform: translateY(-50%);
  color: var(--text3); font-size: 17px; pointer-events: none;
}
.search-meta {
  max-width: 560px; margin: 12px auto 0; font-family: var(--mono);
  font-size: 11.5px; color: var(--text3); min-height: 16px;
}

/* ── PÍLULAS DE CATEGORIA ─────────────────────── */
.pills {
  display: flex; gap: 8px; flex-wrap: wrap; justify-content: center;
  max-width: 920px; margin: 26px auto 0; padding: 0 20px;
}
.pill {
  font-family: var(--mono); font-size: 11.5px; color: var(--text2);
  border: 1px solid var(--border2); border-radius: 999px;
  padding: 7px 14px; cursor: pointer; transition: 0.15s; user-select: none;
  background: var(--bg2);
}
.pill:hover { color: var(--text); border-color: var(--text3); }
.pill.active { color: var(--bg); background: var(--accent); border-color: var(--accent); }

/* ── CONTEÚDO ─────────────────────────────────── */
.wrap { max-width: 920px; margin: 0 auto; padding: 44px 20px 100px; }

.category { margin-bottom: 46px; scroll-margin-top: 90px; }
.category.hidden { display: none; }
.cat-head { display: flex; align-items: baseline; gap: 12px; margin-bottom: 16px; }
.cat-num {
  font-family: var(--mono); font-size: 12px; color: var(--accent);
  border: 1px solid var(--accent-dim2); background: var(--accent-dim);
  border-radius: 6px; padding: 3px 8px;
}
.cat-head h2 { font-size: 19px; font-weight: 700; }
.cat-desc { color: var(--text2); font-size: 13px; margin: -6px 0 18px 0; }

.item {
  border: 1px solid var(--border); border-radius: var(--r);
  background: var(--bg2); margin-bottom: 10px; overflow: hidden;
  transition: border-color 0.15s;
}
.item.hidden { display: none; }
.item.match { border-color: var(--accent-dim2); }
.item summary {
  list-style: none; cursor: pointer; padding: 16px 18px;
  display: flex; align-items: center; justify-content: space-between; gap: 14px;
  font-weight: 500; font-size: 14.5px;
}
.item summary::-webkit-details-marker { display: none; }
.item summary .plus {
  font-family: var(--mono); color: var(--text3); font-size: 17px; flex-shrink: 0;
  transition: transform 0.2s;
}
.item[open] summary .plus { transform: rotate(45deg); color: var(--accent); }
.item .body {
  padding: 0 18px 18px; color: var(--text2); font-size: 13.5px;
}
.item .body p { margin: 0 0 10px; }
.item .body p:last-child { margin-bottom: 0; }
.item .body ul { margin: 0 0 10px 18px; }
.item .body li { margin-bottom: 6px; }
.item .body strong { color: var(--text); }
.item .body code {
  font-family: var(--mono); background: var(--bg4); padding: 2px 6px;
  border-radius: 4px; color: var(--accent); font-size: 12.5px;
}
.path {
  font-family: var(--mono); font-size: 12px; color: var(--accent);
  background: var(--accent-dim); border-radius: 6px; padding: 8px 12px;
  margin: 10px 0; display: inline-block;
}
.warn {
  border-left: 3px solid var(--yellow); background: var(--yellow-dim);
  border-radius: 0 8px 8px 0; padding: 10px 14px; margin: 10px 0;
  color: var(--text); font-size: 13px;
}
.tip {
  border-left: 3px solid var(--accent); background: var(--accent-dim);
  border-radius: 0 8px 8px 0; padding: 10px 14px; margin: 10px 0;
  color: var(--text); font-size: 13px;
}
mark { background: var(--accent-dim2); color: var(--accent); border-radius: 3px; padding: 0 2px; }

.empty-state {
  text-align: center; padding: 60px 20px; color: var(--text3);
  font-family: var(--mono); font-size: 13px; display: none;
}

footer {
  text-align: center; padding: 30px 20px 50px; color: var(--text3);
  font-family: var(--mono); font-size: 11.5px;
}

@media (max-width: 640px) {
  .topbar { padding: 14px 16px; }
  .hero { padding: 40px 16px 22px; }
  .wrap { padding: 32px 14px 80px; }
}
</style>
</head>
<body>

<div class="topbar">
  <div class="brand">
    <div class="brand-mark">M</div>
    <div class="brand-text">MOVE <span>· central de ajuda</span></div>
  </div>
  <a class="back" href="/">← Voltar ao painel</a>
</div>

<div class="hero">
  <div class="eyebrow">Manual interno · Operação Move</div>
  <h1>Central de Ajuda</h1>
  <p class="sub">Consulta rápida para quem ativa, atende e resolve ocorrências no dia a dia da Move.</p>
  <div class="search-wrap">
    <input id="busca" type="text" placeholder="Busque por um assunto, ex: APN, portabilidade, reembolso...">
    <span class="ico">⌕</span>
  </div>
  <div class="search-meta" id="busca-meta"></div>
</div>

<div class="pills" id="pills"></div>

<div class="wrap" id="conteudo"></div>
<div class="empty-state" id="empty">Nada encontrado para esse termo.</div>

<footer>Move · conteúdo interno para a equipe e parceiros de venda</footer>

<script>
const DADOS = [
  {

    itens: [
      {
        q: 'Como funciona o plano Move',
        a: `<p>O plano Move trabalha no formato <strong>Controle</strong>: o cliente paga um valor fixo todo mês e recebe uma franquia de internet, ligações e SMS conforme o pacote escolhido.</p>
            <p>Isso garante previsibilidade — o cliente sempre sabe quanto vai pagar, sem cobranças extras automáticas durante o ciclo.</p>
            <p>Se a franquia acabar antes do fim do ciclo, existem duas saídas:</p>
            <ul>
              <li>Contratar um <strong>pacote adicional</strong> (válido por 7 dias) para continuar usando;</li>

            </ul>`
      },
      {
        q: 'WhatsApp sem consumir o pacote de dados',
        a: `<p>Mensagens, áudios e arquivos enviados pelo WhatsApp não descontam da franquia de internet — é um dos principais diferenciais do plano.</p>
            <div class="warn">⚠️ Chamadas de <strong>voz e vídeo</strong> pelo WhatsApp consomem dados normalmente. Avise o cliente para evitar surpresa no consumo.</div>
            <p>O benefício só funciona com o plano ativo e a APN <code>bora.br</code> corretamente configurada no aparelho.</p>`
      },
      {
        q: 'Dupla conectividade: TIM e Vivo no mesmo chip',
        a: `<p>Com um único chip e plano, o cliente acessa duas redes móveis — <strong>TIM e Vivo</strong> — o que amplia a cobertura, principalmente em regiões onde uma das operadoras tem sinal fraco.</p>

        a: `<p>Indicado quando o cliente vai viajar, muda de rotina ou perde/tem o aparelho furtado. O bloqueio "congela" a linha sem cancelar a recorrência e sem perder o número.</p>

              <li>Permitido <strong>uma vez por ano</strong>;</li>

              <li><strong>Cartão de crédito:</strong> cobrança na data de renovação. Se for recusada, o sistema suspende o plano e tenta novamente 3 dias depois;</li>

            <p>Normalmente a ativação é imediata, mas pode levar até 1 hora em casos de instabilidade da plataforma.</p>`

      }
    ]
  },
  {
    icon: '↔',
    titulo: 'Portabilidade',
    desc: 'Regras, prazos e o que fazer quando a portabilidade não conclui.',
    itens: [
      {
        q: 'O que é portabilidade',
        a: `<p>É o direito do cliente de manter o número de telefone ao trocar de operadora. Na Move, o processo é <strong>gratuito</strong> tanto para o cliente quanto para o parceiro.</p>
            <p>Manter o número antigo reduz a resistência à troca — é um forte argumento de fidelização na hora da venda.</p>`

      {
        q: 'Regras e etapas da portabilidade',

            <ul>
              <li>Solicitação feita na aba <strong>Portabilidade</strong> do painel;</li>

      },
      {
        q: 'Códigos de erro mais comuns na recusa',
        a: `<ul>
              <li><strong>Código 5</strong> — cliente não respondeu ao SMS. Confirme se está com o chip antigo pronto para receber e repita a solicitação;</li>

const pillsEl = document.getElementById('pills');
const conteudoEl = document.getElementById('conteudo');
const emptyEl = document.getElementById('empty');
const buscaEl = document.getElementById('busca');
const buscaMetaEl = document.getElementById('busca-meta');

function slug(s) { return s.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '').replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)/g, ''); }

function render() {
  pillsEl.innerHTML = DADOS.map((cat, i) => `<div class="pill" data-target="cat-${i}">${cat.icon} ${cat.titulo}</div>`).join('');

  conteudoEl.innerHTML = DADOS.map((cat, ci) => `
    <div class="category" id="cat-${ci}">
      <div class="cat-head">
        <span class="cat-num">${String(ci + 1).padStart(2, '0')}</span>
        <h2>${cat.titulo}</h2>
      </div>
      <p class="cat-desc">${cat.desc}</p>
      ${cat.itens.map((it, ii) => `
        <details class="item" id="item-${ci}-${ii}" data-q="${it.q.toLowerCase()}" data-a="${it.a.replace(/<[^>]+>/g, ' ').toLowerCase().replace(/"/g, '&quot;')}">
          <summary><span>${it.q}</span><span class="plus">+</span></summary>
          <div class="body">${it.a}</div>
        </details>
      `).join('')}
    </div>
  `).join('');

  pillsEl.querySelectorAll('.pill').forEach(p => {
    p.addEventListener('click', () => {
      document.getElementById(p.dataset.target).scrollIntoView({ behavior: 'smooth', block: 'start' });
    });
  });
}

function aplicarBusca() {
  const termo = buscaEl.value.trim().toLowerCase();
  let totalVisivel = 0;

  document.querySelectorAll('.category').forEach(cat => {
    let algumVisivelNaCategoria = false;
    cat.querySelectorAll('.item').forEach(item => {
      const texto = item.dataset.q + ' ' + item.dataset.a;
      const bate = !termo || texto.includes(termo);
      item.classList.toggle('hidden', !bate);
      item.classList.toggle('match', !!termo && bate);
      if (bate) { algumVisivelNaCategoria = true; totalVisivel++; }
      if (termo && bate) item.open = true;
      if (!termo) item.open = false;
    });
    cat.classList.toggle('hidden', !algumVisivelNaCategoria);
  });

  emptyEl.style.display = (termo && totalVisivel === 0) ? 'block' : 'none';
  buscaMetaEl.textContent = termo ? `${totalVisivel} resultado${totalVisivel === 1 ? '' : 's'} para "${termo}"` : '';
}

buscaEl.addEventListener('input', aplicarBusca);
render();
</script>
